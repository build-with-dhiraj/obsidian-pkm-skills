name: Publish to PyPI

# Publishes all three packages to PyPI via Trusted Publishing (OIDC) — NO API
# tokens. Each package is built from its own skills/<name>/ directory and
# published independently.
#
# Triggers:
#   - pushing a tag matching v*   (e.g. v0.1.0)
#   - manual workflow_dispatch
#
# ARMING (one-time, per package) — until the user configures a PyPI Trusted
# Publisher for each project, this workflow will fail at the publish step. The
# values to enter on PyPI for every package are:
#   Owner:              build-with-dhiraj
#   Repository:         obsidian-pkm-skills
#   Workflow filename:  publish-pypi.yml
#   Environment:        pypi
#
# IMPORTANT: pushing a v* tag is what fires a real publish. Do not tag until the
# trusted publishers are configured on PyPI.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    name: Build & publish ${{ matrix.skill }}
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # mandatory for OIDC trusted publishing
    strategy:
      fail-fast: false
      matrix:
        skill:
          - obsidian-graph-auditor
          - obsidian-brain-eval
          - obsidian-orphan-killer
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build sdist + wheel
        working-directory: skills/${{ matrix.skill }}
        run: |
          python -m pip install --upgrade pip build
          python -m build --sdist --wheel --outdir dist/

      - name: Publish ${{ matrix.skill }} to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: skills/${{ matrix.skill }}/dist/
