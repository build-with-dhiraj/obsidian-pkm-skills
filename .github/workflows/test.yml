name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Each of the three skills is an independent PyPI package living under
# skills/<name>/. We test them as a matrix: install each in editable mode with
# its [dev] extra, lint its package, then run its pytest suite from its own dir.
jobs:
  test:
    name: ${{ matrix.skill }} (py${{ matrix.python-version }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        skill:
          - obsidian-graph-auditor
          - obsidian-brain-eval
          - obsidian-orphan-killer
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]
    defaults:
      run:
        working-directory: skills/${{ matrix.skill }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Resolve package import path
        id: pkg
        shell: bash
        run: |
          # The importable package dir is the skill name with dashes -> underscores.
          echo "dir=$(echo '${{ matrix.skill }}' | tr '-' '_')" >> "$GITHUB_OUTPUT"

      - name: Lint
        run: |
          python -m ruff check ${{ steps.pkg.outputs.dir }}/ tests/

      - name: Test
        run: |
          python -m pytest -v --cov=${{ steps.pkg.outputs.dir }} --cov-report=term-missing
